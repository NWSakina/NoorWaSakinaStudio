<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو نور وسكينة</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header id="top-bar">
    <h1>🌿 استوديو نور وسكينة</h1>
</header>


<main id="workspace">

    <div id="preview">

        <div id="text-container">

            <div id="text-content" contenteditable="true" spellcheck="false">
بِسْمِ اللَّهِ الرَّحْمٰنِ الرَّحِيمِ
            </div>

        </div>

    </div>

</main>


<!-- لوحة التحكم -->
<section id="control-panel">

    <div id="text-panel" class="panel">
        <h3>🖋️ إعدادات النص</h3>

        <button onclick="increaseText()">تكبير الخط</button>
        <button onclick="decreaseText()">تصغير الخط</button>

    </div>


    <div id="bg-panel" class="panel">
        <h3>🖼️ الخلفية</h3>

        <button onclick="changeBackground()">تغيير الخلفية</button>

    </div>


    <div id="effects-panel" class="panel">
        <h3>✨ المؤثرات</h3>

        <button onclick="addGlow()">إضاءة النص</button>

    </div>


</section>


<nav id="main-dock">

    <button id="textBtn">🖋️ النص</button>

    <button id="bgBtn">🖼️ الخلفية</button>

    <button id="effectsBtn">✨ المؤثرات</button>

    <button id="saveBtn">💾 حفظ</button>

</nav>


<script src="script.js"></script>

</body>

        </html>
