<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استوديو نور وسكينة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lateef&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; background-size: cover; background-position: center; }
        #text-container { position: absolute; padding: 20px; border: 2px solid #d4b46a; border-radius: 10px; touch-action: none; cursor: move; background: rgba(0,0,0,0.3); z-index: 10; min-width: 100px; }
        #text-content { color: #d4b46a; font-family: 'Amiri', serif; font-size: 24px; text-align: center; }
        #main-dock { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f1f38; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid #d4b46a; z-index: 100; }
        .icon { font-size: 1.4rem; cursor: pointer; color: #d4b46a; }
        #sub-dock { position: fixed; bottom: 70px; width: 100%; height: 60px; background: #1a3055; display: none; align-items: center; padding: 0 10px; overflow-x: auto; z-index: 99; border-top: 1px solid #d4b46a; }
        .sub-btn { background: #334e77; color: #fff; border: 1px solid #d4b46a; padding: 5px 10px; margin-left: 5px; border-radius: 5px; font-size: 0.8rem; flex-shrink: 0; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #d4b46a; margin-left: 5px; flex-shrink: 0; cursor: pointer; }
    </style>
</head>
<body>

    <div id="text-container" style="left: 50px; top: 100px;">
        <div id="text-content">باسم الله الرحمن الرحيم</div>
    </div>

    <div id="sub-dock"><div id="sub-options" style="display: flex; align-items: center; width: 100%;"></div></div>

    <div id="main-dock">
        <div class="icon" onclick="openSub('نص')">🖋️</div>
        <div class="icon" onclick="openSub('صور')">🖼️</div>
        <div class="icon" onclick="alert('تراجع')">↩️</div>
        <div class="icon" onclick="alert('تقدم')">↪️</div>
        <div class="icon" onclick="alert('حفظ')">💾</div>
    </div>

    <script>
        function openSub(tool) {
            const sub = document.getElementById('sub-dock');
            const opt = document.getElementById('sub-options');
            sub.style.display = 'flex';
            if (tool === 'نص') {
                opt.innerHTML = `
                    <input type="text" id="textInput" placeholder="اكتب..." style="width: 80px;">
                    <button class="sub-btn" onclick="updateText()">تطبيق</button>
                    <button class="sub-btn" onclick="adjustSize(2)">➕</button>
                    <button class="sub-btn" onclick="changeFont('Lateef')">خط لطيف</button>
                    <div class="color-dot" style="background:#D4AF37" onclick="changeColor('#D4AF37')"></div>
                    <div class="color-dot" style="background:#FFF" onclick="changeColor('#FFF')"></div>
                `;
            } else {
                opt.innerHTML = `
                    <button class="sub-btn" onclick="loadImg('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600')">داكن</button>
                    <button class="sub-btn" onclick="loadImg('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600')">بحر</button>
                `;
            }
        }
        function updateText() { const val = document.getElementById('textInput').value; if(val) document.getElementById('text-content').innerText = val; }
        function adjustSize(d) { const el = document.getElementById('text-content'); let s = parseInt(window.getComputedStyle(el).fontSize); el.style.fontSize = (s + d) + 'px'; }
        function changeFont(f) { document.getElementById('text-content').style.fontFamily = f; }
        function changeColor(c) { document.getElementById('text-content').style.color = c; document.getElementById('text-container').style.borderColor = c; }
        function loadImg(u) { document.body.style.backgroundImage = `url('${u}')`; }

        const cont = document.getElementById('text-container');
        cont.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch') {
                e.preventDefault();
                cont.style.left = (e.clientX - cont.offsetWidth/2) + 'px';
                cont.style.top = (e.clientY - cont.offsetHeight/2) + 'px';
            }
        }, {passive: false});
    </script>
</body>
</html>
