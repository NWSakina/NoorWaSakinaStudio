  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta  charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استوديو نور وسكينة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lateef&family=Scheherazade+New&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; background-size: cover; background-position: center; }
        #text-container { position: absolute; padding: 15px; border: 2px solid #D4AF37; border-radius: 10px; touch-action: none; background: rgba(0,0,0,0.4); z-index: 10; min-width: 150px; }
        #text-content { color: #D4AF37; font-family: 'Amiri', serif; font-size: 24px; text-align: center; outline: none; white-space: pre-wrap; }
        #main-dock { position: fixed; bottom: 0; width: 100%; height: 60px; background: #0f1f38; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid #D4AF37; z-index: 100; }
        .icon { font-size: 1.5rem; cursor: pointer; }
        #sub-dock { position: fixed; bottom: 60px; width: 100%; height: 60px; background: #1a3055; display: none; align-items: center; padding: 5px; overflow-x: auto; z-index: 99; }
        .btn-style { background: #334e77; color: #fff; border: 1px solid #D4AF37; padding: 8px; margin: 3px; border-radius: 5px; font-size: 0.9rem; white-space: nowrap; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; margin: 3px; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="text-container" style="left: 50px; top: 100px;">
        <div id="text-content" contenteditable="true">باسم الله الرحمن الرحيم</div>
    </div>

    <div id="sub-dock"><div id="sub-options" style="display: flex; align-items: center;"></div></div>

    <div id="main-dock">
        <div class="icon" onclick="toggleSub()">🖋️</div>
        <div class="icon" onclick="alert('الصور')">🖼️</div>
        <div class="icon">💾</div>
    </div>

    <script>
        function toggleSub() {
            const sub = document.getElementById('sub-dock');
            sub.style.display = (sub.style.display === 'flex') ? 'none' : 'flex';
            if (sub.style.display === 'flex') {
                document.getElementById('sub-options').innerHTML = `
                    <div class="color-dot" style="background:#FF4444" onclick="setColor('#FF4444')"></div>
                    <div class="color-dot" style="background:#FFF" onclick="setColor('#FFF')"></div>
                    <div class="color-dot" style="background:#D4AF37" onclick="setColor('#D4AF37')"></div>
                    <button class="btn-style" onclick="setFont('Amiri')">Amiri</button>
                    <button class="btn-style" onclick="setFont('Lateef')">Lateef</button>
                    <button class="btn-style" onclick="setFont('Scheherazade New')">Scheherazade</button>
                `;
            }
        }
        function setColor(c) { document.getElementById('text-content').style.color = c; document.getElementById('text-container').style.borderColor = c; }
        function setFont(f) { document.getElementById('text-content').style.fontFamily = f; }

        const cont = document.getElementById('text-container');
        cont.addEventListener('pointermove', (e) => {
            if (document.activeElement.id === 'text-content') return;
            if (e.pointerType === 'touch') {
                e.preventDefault();
                cont.style.left = (e.clientX - cont.offsetWidth/2) + 'px';
                cont.style.top = (e.clientY - cont.offsetHeight/2) + 'px';
            }
        }, {passive: false});
    </script>
</body>
</html>
