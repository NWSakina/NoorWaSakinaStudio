<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استوديو نور وسكينة</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #0f1f38; color: #d4b46a; }
        #preview-area { flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 5px solid #d4b46a; }
        #control-panel { flex: 1; padding: 20px; display: flex; gap: 15px; justify-content: center; align-items: center; }
        button { padding: 15px 30px; cursor: pointer; background-color: #d4b46a; color: #0f1f38; border: none; border-radius: 8px; font-weight: bold; }
        select { padding: 10px; border-radius: 5px; background: #d4b46a; color: #0f1f38; border: none; }
    </style>
</head>
<body>

    <div id="preview-area">
        <h1>شاشة المعاينة</h1>
        <div id="selection-box"></div>
    </div>

    <div id="control-panel">
        <button onclick="showSurahOptions()">اختيار السورة</button>
        <button>اختيار الخلفية</button>
        <button>تصدير الفيديو</button>
    </div>

    <script>
        function showSurahOptions() {
            const box = document.getElementById('selection-box');
            box.innerHTML = `
                <select>
                    <option>الفاتحة</option>
                    <option>البقرة</option>
                    <option>آل عمران</option>
                </select>
                <input type="number" placeholder="من آية" style="width:60px">
                <input type="number" placeholder="إلى آية" style="width:60px">
            `;
        }
    </script>
</body>
</html>
