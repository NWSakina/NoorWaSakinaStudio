<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استوديو نور وسكينة</title>
    <!-- استيراد خطوط القرآن الكريم -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lateef&family=Scheherazade+New&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; background-size: cover; background-position: center; transition: background 0.3s ease; }
        #preview-area { height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; width: 100%; }
        
        #text-container { 
            position: absolute; padding: 20px; border: 2px solid #d4b46a; 
            border-radius: 10px; touch-action: none; cursor: move; color: #d4b46a; 
            z-index: 10; background: rgba(0,0,0,0.3); font-family: 'Amiri', serif; 
            font-size: 24px; text-align: center; min-width: 100px;
        }
        
        #main-dock { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f1f38; display: flex; align-items: center; overflow-x: auto; border-top: 2px solid #d4b46a; z-index: 100; }
        .icon { min-width: 60px; text-align: center; font-size: 1.5rem; cursor: pointer; color: #d4b46a; }
        
        #sub-dock { position: fixed; bottom: 70px; width: 100%; height: 60px; background: #1a3055; display: none; align-items: center; z-index: 99; border-top: 1px solid rgba(212, 180, 106, 0.3); }
        .sub-btn { background: #334e77; color: #fff; border: 1px solid #d4b46a; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; flex-shrink: 0; margin-left: 5px; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #d4b46a; flex-shrink: 0; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="preview-area">
        <div id="text-container">باسم الله الرحمن الرحيم</div>
    </div>

    <div id="sub-dock">
        <div id="sub-options" style="display: flex; align-items: center; padding: 0 10px; overflow-x: auto; width: 100%;"></div>
    </div>

    <div id="main-dock">
        <div class="icon" onclick="openSub('قوالب')">📋</div>
        <div class="icon" onclick="openSub('نص')">🖋️</div>
        <div class="icon" onclick="openSub('صور/فيديو')">🖼️</div>
        <div class="icon" onclick="openSub('صوت/تزامن')">🔊</div>
        <div class="icon" onclick="alert('تراجع')">↩️</div>
        <div class="icon" onclick="alert('تقدم')">↪️</div>
        <div class="icon" onclick="alert('حفظ')">💾</div>
    </div>

    <script>
        function openSub(tool) {
            const sub = document.getElementById('sub-dock');
            const subOptions = document.getElementById('sub-options');
            sub.style.display = 'flex';
            subOptions.innerHTML = '';
            
            if (tool === 'صور/فيديو') {
                subOptions.innerHTML = `
                    <button class="sub-btn" onclick="document.getElementById('bgInput').click()">📁</button>
                    <input type="file" id="bgInput" style="display:none" onchange="loadBackground(event)">
                    <div class="color-dot" onclick="setBgColor('#000000')" style="background: #000;"></div>
                    <div class="color-dot" onclick="setBgColor('#0a1424')" style="background: #0a1424;"></div>
                    <button class="sub-btn" onclick="loadTemplate('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600')">داكن</button>
                `;
            } else if (tool === 'نص') {
                subOptions.innerHTML = `
                    <input type="text" id="textInput" placeholder="اكتب..." style="width: 80px; padding: 5px;">
                    <button class="sub-btn" onclick="updateText()">تطبيق</button>
                    <button class="sub-btn" onclick="adjustSize(2)">➕</button>
                    <button class="sub-btn" onclick="adjustSize(-2)">➖</button>
                    <button class="sub-btn" onclick="changeFont('Amiri')">Amiri</button>
                    <button class="sub-btn" onclick="changeFont('Lateef')">Lateef</button>
                    <div class="color-dot" onclick="changeTextColor('#D4AF37')" style="background: #D4AF37;"></div>
                    <div class="color-dot" onclick="changeTextColor('#FFFFFF')" style="background: #FFFFFF;"></div>
                `;
            }
        }

        function updateText() {
            const newText = document.getElementById('textInput').value;
            if (newText) document.getElementById('text-container').innerText = newText;
        }

        function adjustSize(delta) {
            const el = document.getElementById('text-container');
            let size = parseInt(window.getComputedStyle(el).fontSize);
            el.style.fontSize = (size + delta) + 'px';
        }

        function changeFont(fontFamily) {
            document.getElementById('text-container').style.fontFamily = fontFamily;
        }

        function changeTextColor(color) {
            const el = document.getElementById('text-container');
            el.style.color = color;
            el.style.borderColor = color;
        }

        function setBgColor(color) { document.body.style.backgroundImage = 'none'; document.body.style.backgroundColor = color; }
        function loadTemplate(url) { document.body.style.backgroundImage = `url('${url}')`; }
        function loadBackground(event) {
            const reader = new FileReader();
            reader.onload = function(e) { document.body.style.backgroundImage = `url('${e.target.result}')`; };
            reader.readAsDataURL(event.target.files[0]);
        }

        const container = document.getElementById('text-container');
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            container.style.left = (touch.clientX - container.offsetWidth/2) + 'px';
            container.style.top = (touch.clientY - container.offsetHeight/2) + 'px';
        }, {passive: false});
    </script>
</body>
</html>
