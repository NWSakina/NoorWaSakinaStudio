<!-- أضف هذا الرابط في قسم <head> بدلاً من الرابط القديم -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lateef&family=Scheherazade+New&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* أضف هذه الخصائص للنص لضمان ظهور التشكيل بشكل احترافي */
    #text-content { 
        color: #D4AF37; 
        font-family: 'Cairo', sans-serif; 
        font-size: 24px; 
        outline: none; 
        white-space: pre-wrap; 
        transition: all 0.2s;
        /* هذا السطر هو السر في ظهور التشكيل بشكل منضبط */
        font-feature-settings: "kern" 1, "onum" 1, "dlig" 1; 
        line-height: 1.8; /* زيادة المسافة للأسطر لكي لا تتداخل حركات التشكيل */
    }
</style>
