<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استوديو نور وسكينة - المحرر الاحترافي</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0b1a2e; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* شاشة المعاينة */
        #preview-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        
        /* الإطار الذكي والنص */
        #text-container {
            position: absolute; padding: 20px; background: rgba(0,0,0,0.5); border: 2px solid #d4b46a;
            border-radius: 10px; cursor: move; transition: 0.1s;
            display: inline-block; text-align: center;
        }
        #preview-text { font-family: 'Amiri', serif; font-size: 2rem; color: #d4b46a; margin: 0; }
        
        /* لوحة التحكم الجانبية */
        #sidebar { width: 300px; background: #0f1f38; padding: 20px; overflow-y: auto; border-right: 2px solid #d4b46a; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #d4b46a; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

    <div id="preview-area">
        <div id="text-container">
            <h1 id="preview-text">الآية الكريمة</h1>
        </div>
    </div>

    <div id="sidebar">
        <h3>أدوات المونتاج</h3>
        <div class="control-group">
            <label>الحجم (Scale)</label>
            <input type="range" min="0.5" max="3" step="0.1" value="1" oninput="applyTransform()">
        </div>
        <div class="control-group">
            <label>التدوير (Rotate)</label>
            <input type="range" min="0" max="360" value="0" oninput="applyTransform()">
        </div>
        <div class="control-group">
            <label>الشفافية (Opacity)</label>
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateBox('opacity', this.value)">
        </div>
        <div class="control-group">
            <label>تدوير الزوايا (Radius)</label>
            <input type="range" min="0" max="50" value="10" oninput="updateBox('radius', this.value)">
        </div>
    </div>

    <script>
        const container = document.getElementById('text-container');
        const text = document.getElementById('preview-text');

        function applyTransform() {
            const scale = document.querySelectorAll('input')[0].value;
            const rotate = document.querySelectorAll('input')[1].value;
            container.style.transform = `scale(${scale}) rotate(${rotate}deg)`;
        }

        function updateBox(prop, val) {
            if(prop === 'opacity') container.style.backgroundColor = `rgba(0,0,0,${val})`;
            if(prop === 'radius') container.style.borderRadius = `${val}px`;
        }
    </script>
</body>
                </html>
