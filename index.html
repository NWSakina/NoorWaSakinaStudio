<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استوديو نور وسكينة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lateef&family=Scheherazade+New&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; }
        #text-container { position: absolute; left: 20px; top: 100px; padding: 15px; border: 2px solid #D4AF37; touch-action: none; background: rgba(0,0,0,0.5); }
        #text-content { 
            color: #D4AF37; 
            font-family: 'Cairo', sans-serif; 
            font-size: 24px; 
            outline: none; 
            white-space: pre-wrap; 
            font-feature-settings: "kern" 1, "onum" 1, "dlig" 1; 
            line-height: 1.8;
            /* تأثير التوهج الافتراضي عند عدم تفعيله */
            transition: all 0.3s ease;
        }
        #toolbar { position: fixed; bottom: 0; width: 100%; height: 120px; background: #0f1f38; display: flex; flex-direction: column; border-top: 2px solid #D4AF37; }
        .row { display: flex; overflow-x: auto; padding: 5px; gap: 5px; }
        button { background: #334e77; color: #fff; border: 1px solid #D4AF37; padding: 5px 10px; border-radius: 4px; white-space: nowrap; cursor: pointer;}
        button:active { background: #557ab8; }
    </style>
</head>
<body>

    <div id="text-container"><div id="text-content" contenteditable="true">باسم الله الرحمن الرحيم</div></div>

    <div id="toolbar">
        <div class="row">
            <button onclick="changeStyle('fontFamily', 'Cairo')">Cairo</button>
            <button onclick="changeStyle('fontFamily', 'Amiri')">Amiri</button>
            <button onclick="changeStyle('fontFamily', 'Lateef')">Lateef</button>
            <button onclick="changeStyle('fontWeight', 'bold')">عريض</button>
        </div>
        <div class="row">
            <button onclick="changeStyle('color', '#D4AF37')">ذهبي</button>
            <button onclick="changeStyle('color', '#FFF')">أبيض</button>
            <button onclick="changeStyle('color', '#FF4444')">أحمر</button>
            <!-- الزر الجديد هنا -->
            <button onclick="toggleGlow()" style="background: #6a11cb; border-color: #fff;">توهج</button>
        </div>
    </div>

    <script>
        // متغير لتتبع حالة التوهج (مفعل/غير مفعل)
        let glowActive = false;
        // متغير لحفظ اللون الحالي للنص لتطبيق التوهج عليه
        let currentGlowColor = '#D4AF37'; 

        function changeStyle(prop, val) {
            const el = document.getElementById('text-content');
            if(prop === 'color') { 
                el.style.color = val; 
                document.getElementById('text-container').style.borderColor = val; 
                currentGlowColor = val; // تحديث لون التوهج عند تغيير لون النص
                if(glowActive) toggleGlow(); // إعادة تفعيل التوهج باللون الجديد إذا كان نشطاً
            }
            else el.style[prop] = val;
        }

        // دالة التبديل لتشغيل أو إيقاف التوهج
        function toggleGlow() {
            const el = document.getElementById('text-content');
            const glowBtn = document.querySelector('[onclick="toggleGlow()"]');
            
            if (!glowActive) {
                // تطبيق التوهج: 4 طبقات من الظل لإنشاء تأثير الهالة الناعمة
                // الصيغة: text-shadow: X-offset Y-offset Blur-radius Color
                el.style.textShadow = `0 0 5px ${currentGlowColor}, 0 0 10px ${currentGlowColor}, 0 0 20px ${currentGlowColor}, 0 0 40px ${currentGlowColor}`;
                glowActive = true;
                glowBtn.style.background = '#8e44ad'; // تغيير لون الزر ليشير بأنه "مفعل"
                glowBtn.innerText = 'توهج (مفعل)';
            } else {
                // إزالة التوهج
                el.style.textShadow = 'none';
                glowActive = false;
                glowBtn.style.background = '#6a11cb'; // إعادة لون الزر الأصلي
                glowBtn.innerText = 'توهج';
            }
        }

        // إعدادات السحب باللمس
        const el = document.getElementById('text-container');
        el.addEventListener('pointermove', (e) => {
            if(e.pointerType === 'touch' && document.activeElement.id !== 'text-content') {
                e.preventDefault();
                el.style.left = (e.clientX - el.offsetWidth/2) + 'px';
                el.style.top = (e.clientY - el.offsetHeight/2) + 'px';
            }
        }, {passive: false});
    </script>
</body>
    </html>
