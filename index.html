<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استوديو نور وسكينة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lateef&family=Scheherazade+New&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; background-size: cover; background-position: center; }
        #text-container { position: absolute; padding: 20px; border: 2px solid #D4AF37; border-radius: 10px; touch-action: none; background: rgba(0,0,0,0.4); z-index: 10; min-width: 150px; }
        #text-content { color: #D4AF37; font-size: 24px; outline: none; white-space: pre-wrap; transition: all 0.2s; }
        #main-dock { position: fixed; bottom: 0; width: 100%; height: 60px; background: #0f1f38; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid #D4AF37; z-index: 100; }
        .icon { font-size: 1.5rem; cursor: pointer; }
        #sub-dock { position: fixed; bottom: 60px; width: 100%; height: 120px; background: #1a3055; display: none; flex-direction: column; padding: 5px; z-index: 99; border-top: 1px solid #D4AF37; }
        .row { display: flex; overflow-x: auto; width: 100%; margin-bottom: 5px; }
        .btn-style { background: #334e77; color: #fff; border: 1px solid #D4AF37; padding: 5px 10px; margin: 2px; border-radius: 5px; font-size: 0.8rem; white-space: nowrap; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; margin: 2px; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="text-container" style="left: 50px; top: 100px;">
        <div id="text-content" contenteditable="true">باسم الله الرحمن الرحيم</div>
    </div>

    <div id="sub-dock">
        <div class="row" id="sub-content"></div>
    </div>

    <div id="main-dock">
        <div class="icon" onclick="openTool('pen')">🖋️</div>
        <div class="icon" onclick="openTool('img')">🖼️</div>
        <div class="icon" onclick="alert('جاري الحفظ...')">💾</div>
    </div>

    <script>
        function openTool(type) {
            const sub = document.getElementById('sub-dock');
            const cont = document.getElementById('sub-content');
            sub.style.display = 'flex';
            if (type === 'pen') {
                cont.innerHTML = `
                    <div class="color-dot" style="background:#FF4444" onclick="setStyle('color', '#FF4444')"></div>
                    <div class="color-dot" style="background:#FFF" onclick="setStyle('color', '#FFF')"></div>
                    <div class="color-dot" style="background:#D4AF37" onclick="setStyle('color', '#D4AF37')"></div>
                    <button class="btn-style" onclick="setStyle('fontFamily', 'Amiri')">Amiri</button>
                    <button class="btn-style" onclick="setStyle('fontFamily', 'Lateef')">Lateef</button>
                    <button class="btn-style" onclick="setStyle('fontFamily', 'Scheherazade New')">Scheherazade</button>
                    <button class="btn-style" onclick="setStyle('textAlign', 'center')">وسط</button>
                    <button class="btn-style" onclick="setStyle('fontWeight', 'bold')">عريض</button>
                `;
            } else {
                cont.innerHTML = `
                    <button class="btn-style" onclick="loadBg('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600')">داكن</button>
                    <button class="btn-style" onclick="loadBg('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600')">بحر</button>
                `;
            }
        }
        function setStyle(prop, val) { 
            const el = document.getElementById('text-content');
            if(prop === 'color') { el.style.color = val; document.getElementById('text-container').style.borderColor = val; }
            else el.style[prop] = val; 
        }
        function loadBg(url) { document.body.style.backgroundImage = 'url('+url+')'; }

        const cont = document.getElementById('text-container');
        cont.addEventListener('pointermove', (e) => {
            if (document.activeElement.id === 'text-content') return;
            if (e.pointerType === 'touch') {
                e.preventDefault();
                cont.style.left = (e.clientX - cont.offsetWidth/2) + 'px';
                cont.style.top = (e.clientY - cont.offsetHeight/2) + 'px';
            }
        }, {passive: false});
    </script>
</body>
</html>
