<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استوديو نور وسكينة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lateef&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; transition: background 0.5s ease; background-size: cover; background-position: center; }
        #text-container { position: absolute; left: 20px; top: 100px; padding: 15px; border: 2px solid #D4AF37; touch-action: none; background: rgba(0,0,0,0.5); }
        #text-content { color: #D4AF37; font-family: 'Cairo', sans-serif; font-size: 24px; outline: none; white-space: pre-wrap; line-height: 1.8; transition: all 0.3s ease; }
        #main-dock { position: fixed; bottom: 0; width: 100%; height: 60px; background: #0f1f38; display: flex; align-items: center; justify-content: space-around; border-top: 2px solid #D4AF37; z-index: 100; }
        #sub-dock, #bg-dock { position: fixed; bottom: 60px; width: 100%; display: none; flex-direction: column; background: #1a3055; border-top: 1px solid #D4AF37; padding: 10px; gap: 8px; z-index: 99; }
        .icon { font-size: 1.5rem; cursor: pointer; }
        .row { display: flex; overflow-x: auto; gap: 5px; padding: 5px; }
        button { background: #334e77; color: #fff; border: 1px solid #D4AF37; padding: 5px 12px; border-radius: 4px; white-space: nowrap; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="text-container"><div id="text-content" contenteditable="true">باسم الله الرحمن الرحيم</div></div>

    <!-- قائمة القلم -->
    <div id="sub-dock">
        <div class="row">
            <button onclick="changeStyle('fontFamily', 'Cairo')">Cairo</button>
            <button onclick="changeStyle('fontFamily', 'Amiri')">Amiri</button>
            <button onclick="toggleGlow()">توهج</button>
        </div>
        <div class="row">
            <button onclick="changeSize(2)">تكبير +</button>
            <button onclick="changeSize(-2)">تصغير -</button>
        </div>
        <div class="row">
            <button onclick="changeStyle('color', '#D4AF37')">ذهبي</button>
            <button onclick="changeStyle('color', '#FFF')">أبيض</button>
        </div>
    </div>

    <!-- قائمة الخلفيات -->
    <div id="bg-dock">
        <div class="row">
            <button onclick="document.getElementById('file-input').click()">🖼️ من هاتفك</button>
            <input type="file" id="file-input" style="display:none" onchange="uploadImage(this)">
        </div>
        <div class="row">
            <button onclick="changeBg('url(\'https://images.unsplash.com/photo-1506744038136-46273834b3fb\')')">طبيعة 1</button>
            <button onclick="changeBg('url(\'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05\')')">طبيعة 2</button>
        </div>
        <div class="row">
            <button onclick="changeBg('#0f1f38')">أزرق داكن</button>
            <button onclick="changeBg('linear-gradient(135deg, #1a3055, #2c1e0f)')">تدرج ملكي</button>
        </div>
    </div>

    <div id="main-dock">
        <div class="icon" onclick="toggleMenu('sub-dock')">🖋️</div>
        <div class="icon" onclick="toggleMenu('bg-dock')">🖼️</div>
        <div class="icon" onclick="alert('ميزة الحفظ قريباً')">💾</div>
    </div>

    <script>
        function toggleMenu(id) {
            const el = document.getElementById(id);
            const other = (id === 'sub-dock') ? 'bg-dock' : 'sub-dock';
            document.getElementById(other).style.display = 'none';
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }
        function changeBg(val) { 
            document.body.style.backgroundImage = val.includes('url') ? val : 'none';
            document.body.style.background = val.includes('url') ? '' : val; 
        }
        function uploadImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.body.style.backgroundImage = `url('${e.target.result}')`;
                    document.body.style.background = '';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        function changeStyle(prop, val) { document.getElementById('text-content').style[prop] = val; }
        function changeSize(step) {
            const el = document.getElementById('text-content');
            let size = parseInt(window.getComputedStyle(el).fontSize);
            el.style.fontSize = (size + step) + 'px';
        }
        let glow = false;
        function toggleGlow() {
            glow = !glow;
            const el = document.getElementById('text-content');
            el.style.textShadow = glow ? `0 0 10px ${el.style.color || '#D4AF37'}` : 'none';
        }
        const container = document.getElementById('text-container');
        container.addEventListener('pointermove', (e) => {
            if(e.pointerType === 'touch' && document.activeElement.id !== 'text-content') {
                container.style.left = (e.clientX - 50) + 'px';
                container.style.top = (e.clientY - 50) + 'px';
            }
        }, {passive: false});
    </script>
</body>
        </html>
