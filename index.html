<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استوديو نور وسكينة</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #preview-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; transition: height 0.3s ease; width: 100%; }
        
        #text-container { position: absolute; padding: 20px; background: rgba(0,0,0,0.5); border: 2px solid #d4b46a; border-radius: 10px; touch-action: none; cursor: move; color: #d4b46a; z-index: 10; }
        
        /* الشريط السفلي المثبت - الحل الجذري */
        #main-dock { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
            background: #0f1f38; display: flex; justify-content: space-around; 
            align-items: center; border-top: 2px solid #d4b46a; z-index: 100;
        }
        .icon { color: #d4b46a; font-size: 1.5rem; padding: 10px; }
    </style>
</head>
<body>

    <div id="preview-area">
        <div id="text-container">
            <span id="preview-text">الآية الكريمة</span>
        </div>
    </div>

    <div id="main-dock">
        <div class="icon" onclick="alert('فتح معرض الصور')">🖼️</div>
        <div class="icon" onclick="alert('تعديل النص')">🖋️</div>
        <div class="icon" onclick="alert('تنسيق الإطار')">⚙️</div>
        <div class="icon" onclick="alert('حفظ العمل')">💾</div>
    </div>

    <script>
        const container = document.getElementById('text-container');
        // تحريك باللمس
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            container.style.left = (touch.clientX - container.offsetWidth/2) + 'px';
            container.style.top = (touch.clientY - container.offsetHeight/2) + 'px';
        }, {passive: false});
    </script>
</body>
</html>
